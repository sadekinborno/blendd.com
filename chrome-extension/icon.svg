<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Cyan to Pink Gradient -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    
    <!-- Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark Rounded Container with Fine Glowing Border -->
  <rect x="8" y="8" width="112" height="112" rx="28" fill="#121318" stroke="url(#neonGrad)" stroke-width="2" />
  
  <!-- Stylized Glowing ▲ Delta Logo -->
  <g filter="url(#glow)" transform="translate(0, 4)">
    <!-- Outer Delta -->
    <path d="M64 26 L100 88 H28 Z" fill="url(#neonGrad)" />
    <!-- Inner Cutout -->
    <path d="M64 42 L88 82 H40 Z" fill="#121318" />
    <!-- Center floating triangle -->
    <path d="M64 52 L76 74 H52 Z" fill="url(#neonGrad)" />
  </g>
</svg>
