<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blendd Saver</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header (Shared) -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">▲</span>
        <span class="logo-text">Blendd <span class="subtext">Saver</span></span>
      </div>
      <button id="btn-settings" class="btn-icon hidden" title="Settings">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
    </header>

    <!-- 1. LOGIN VIEW -->
    <div id="view-login" class="view">
      <div class="welcome-text">
        <h2>Sign In</h2>
        <p>Connect the extension to your Blendd portal</p>
      </div>

      <div class="form-group">
        <label for="login-server-url">Portal Server URL</label>
        <input type="url" id="login-server-url" placeholder="e.g. http://localhost:3000 or https://blendd.com">
      </div>

      <div class="form-group">
        <label for="login-username">Username</label>
        <div class="input-with-button">
          <input type="text" id="login-username" placeholder="Enter your username">
          <button id="btn-detect-login-user" class="btn-secondary" title="Auto-detect from open Blendd tabs">Detect</button>
        </div>
      </div>

      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>

      <button id="btn-login-submit" class="btn-primary">
        <span>Sign In & Connect</span>
        <div id="login-spinner" class="spinner hidden"></div>
      </button>
    </div>

    <!-- 2. MAIN SAVER VIEW -->
    <div id="view-main" class="view hidden">
      <!-- Active Tab Preview Card -->
      <div class="card-preview">
        <img id="preview-favicon" class="favicon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23888' stroke-width='2'%3E%3Ccircle cx='12' cy='12' r='10'/%3E%3Cpath d='M8 12h8'/%3E%3C/svg%3E" alt="favicon">
        <div class="preview-details">
          <div id="preview-title" class="preview-title">Loading current page...</div>
          <div id="preview-domain" class="preview-domain">unknown.com</div>
        </div>
      </div>

      <!-- Bookmark Form Inputs -->
      <div class="form-group">
        <label for="input-title">Custom Title</label>
        <input type="text" id="input-title" placeholder="Give this link a name">
      </div>

      <div class="row">
        <div class="form-group half">
          <label for="input-category">Category</label>
          <select id="input-category">
            <option value="General">General</option>
            <option value="Dev / Tech">Dev / Tech</option>
            <option value="Design">Design</option>
            <option value="Reading">Reading</option>
            <option value="Media / Video">Media / Video</option>
            <option value="Tools">Tools</option>
          </select>
        </div>
        <div class="form-group half">
          <label for="input-folder">Private Folder <span class="optional">(Optional)</span></label>
          <input type="text" id="input-folder" placeholder="e.g. Work, Ideas">
        </div>
      </div>

      <button id="btn-save" class="btn-primary">
        <span>Save to Private Space</span>
        <div id="spinner" class="spinner hidden"></div>
      </button>
    </div>

    <!-- 3. CONFIGURATION / SETTINGS VIEW -->
    <div id="view-settings" class="view hidden">
      <div class="settings-header">
        <h3>Configuration</h3>
        <button id="btn-settings-back" class="btn-text">Back</button>
      </div>

      <div class="form-group">
        <label for="input-server-url">Portal Server URL</label>
        <input type="url" id="input-server-url" placeholder="http://localhost:3000">
      </div>

      <div class="form-group">
        <label>Active User</label>
        <div class="user-badge-container">
          <span id="active-user-badge" class="badge">Guest</span>
        </div>
      </div>

      <button id="btn-settings-save" class="btn-primary" style="margin-bottom: 8px;">Save Settings</button>
      <button id="btn-logout" class="btn-secondary danger">Sign Out</button>
    </div>

    <!-- Shared Status Messages -->
    <div id="status-message" class="status-message hidden"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
